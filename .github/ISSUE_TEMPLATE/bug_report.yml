name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private messages, or production databases. Report security vulnerabilities privately through the Security tab.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or full commit SHA
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Windows 11
        - Windows 10
        - Linux test or development environment
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted diagnostics
      description: Remove tokens, personal content, paths, IDs, and OAuth data.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and personal data from this report.
          required: true
        - label: This is not a security vulnerability requiring private disclosure.
          required: true
