name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: 0.11.29

jobs:
  test:
    name: Tests and quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Verify locked dependencies
        run: uv lock --check

      - name: Install locked dependencies
        run: uv sync --locked --python 3.13 --group dev

      - name: Run full test suite
        run: uv run --locked --python 3.13 --group dev pytest

      - name: Run Ruff
        run: uv run --locked --python 3.13 --group dev ruff check src tests

      - name: Compile source and tests
        run: uv run --locked --python 3.13 python -m compileall -q src tests

      - name: Build release artifacts
        run: uv build

      - name: Check whitespace in tracked files
        shell: bash
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD

      - name: Reject local state in tracked files
        shell: bash
        run: |
          if git ls-files config.toml .env | grep -q .; then
            echo "Local configuration must not be tracked."
            exit 1
          fi
          if git ls-files '*.db' 'data/**' | grep -q .; then
            echo "SQLite state or data artifacts must not be tracked."
            exit 1
          fi

  windows-test:
    name: Windows tests
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked --python 3.13 --group dev

      - name: Run full test suite
        run: uv run --locked --python 3.13 --group dev pytest

      - name: Compile source and tests
        run: uv run --locked --python 3.13 python -m compileall -q src tests

  migration-security-regressions:
    name: Migration and security regressions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked --python 3.13 --group dev

      - name: Run migration and authorization regressions
        run: >-
          uv run --locked --python 3.13 --group dev pytest
          tests/test_sqlite_schema.py
          tests/test_oauth_credentials.py
          tests/test_oauth_lifecycle.py
          tests/test_telegram_router.py
          tests/test_application_service.py
